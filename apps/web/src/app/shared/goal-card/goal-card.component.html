<mat-card class="goal-card" appearance="outlined">
    <mat-card-header>
        <mat-card-title class="goal-title-row">
            <div>
                {{ cardData?.goalKey | capitalizeFirstLetter }}
            </div>
            <div class="count-badge">
                 {{ actionsLength }}
            </div>
        </mat-card-title>
    </mat-card-header>
    <mat-card-content class="muted">
        Why: {{ cardData?.why }}
    </mat-card-content>
    <mat-card-content>
        Next Actions:
            <div class="action-list">
                <mat-radio-group 
                    [(ngModel)]="currentSelectionId" 
                    name="'actions.'{{cardData?.goalKey}}"
                    class="goal-actions"
                >
                    <div *ngFor="let action of cardData?.nextActions | slice:0:3; trackBy: trackById">
                        <mat-radio-button 
                            value="{{action.id}}" 
                            (change)="saveSelection(action.id)"
                            >{{ action.text }}
                        </mat-radio-button>
                    </div>
                </mat-radio-group>
            </div>
    </mat-card-content>
    <mat-card-actions class="card-content">
        <button mat-flat-button color="primary" (click)="openTimerDialog()">Start 10 minutes</button>
    </mat-card-actions>
</mat-card>
