<div>
    <div *ngIf="isLoading">Loading...</div>
    <div *ngIf="error">{{ error }}</div>
    <div *ngIf="!isLoading" class="pipeline">
        <div *ngFor="let stage of stages" class="pipeline-col">
            <div class="pipeline-col-header">
                <p class="pipeline-col-title">{{ stage.stageName | capitalizeFirstLetter }}</p>
                <p class="pipeline-col-count">Count: {{ stage.stageCards ? stage.stageCards.length : 0}}</p>
            </div>
            <div *ngFor="let card of stage.stageCards">
                <app-job-card 
                    [jobCardData]="card" 
                    (moveEvent)="moveCard($event)"
                    (touchUpdateEvent)="setNextTouch($event)"
                    >
                </app-job-card>
            </div>
        </div>
    </div>
</div>
