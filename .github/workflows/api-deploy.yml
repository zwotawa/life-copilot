name: Deploy API to Azure App Service

on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-deploy.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.418"

      - name: Restore
        run: dotnet restore apps/api/LifeCopilot.Api/LifeCopilot.Api.csproj

      - name: Build
        run: dotnet build apps/api/LifeCopilot.Api/LifeCopilot.Api.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish apps/api/LifeCopilot.Api/LifeCopilot.Api.csproj -c Release -o ${{ github.workspace }}/publish

      - name: List publish output (debug)
        run: |
          ls -la ${{ github.workspace }}/publish
          find ${{ github.workspace }}/publish -maxdepth 2 -type f -name "*.runtimeconfig.json" -o -name "*.dll"

      - name: Zip publish output
        run: |
          cd ${{ github.workspace }}/publish
          zip -r ../publish.zip .

      - name: Set GIT_SHA in Azure App Service
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          app-settings-json: |
            [
              {
                "name": "GIT_SHA",
                "value": "${{ github.sha }}",
                "slotSetting": false
              }
            ]

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish.zip
      - name: Warmup + Health check (retry)
        env:
          BASE_URL: ${{ secrets.AZURE_WEBAPP_BASE_URL }}
        run: |
          for i in {1..12}; do
            echo "Attempt $i..."
            if curl -fsS "$BASE_URL/health" > /dev/null; then
              echo "✅ /health OK"
              break
            fi
            sleep 10
          done

          # Fail if still not healthy after retries
          curl -fsS "$BASE_URL/health"

      - name: DB health check (retry)
        env:
          BASE_URL: ${{ secrets.AZURE_WEBAPP_BASE_URL }}
        run: |
          for i in {1..12}; do
            echo "Attempt $i..."
            if curl -fsS "$BASE_URL/health/db" > /dev/null; then
              echo "✅ /health/db OK"
              break
            fi
            sleep 10
          done

          # Fail if still not healthy after retries
          curl -fsS "$BASE_URL/health/db"